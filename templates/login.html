<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunity Inbox Copilot - Login</title>
  <style>
    :root {
      --bg: #f4efe8;
      --ink: #1e1f24;
      --accent: #0a7f5a;
      --accent-2: #f08a24;
      --card: #fffaf2;
      --muted: #60626b;
      --border: #dad1c3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #f6debc 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, #cde9dc 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 1.9rem;
      letter-spacing: 0.2px;
    }
    p {
      color: var(--muted);
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      border: 0;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(10, 127, 90, 0.25);
    }
    .meta {
      margin-top: 16px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      margin-top: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.85rem;
      color: #434750;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opportunity Inbox Copilot</h1>
    <p>
      Sign in with Google and fetch opportunity-related emails from your Gmail inbox.
      This MVP currently retrieves and displays emails only.
    </p>

    {% if user %}
      <p class="pill">Signed in as {{ user.email }}</p>
      <a class="btn" href="{{ url_for('dashboard') }}">Go to Dashboard</a>
    {% else %}
      <a class="btn" href="{{ url_for('auth_google_start') }}">Sign in with Google</a>
    {% endif %}

    <div class="meta">
      Scope used: <code>gmail.readonly</code>
    </div>
  </main>
</body>
</html>
